name: CI

on:
  pull_request:
  push:
    branches:
      - mvp

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: just test
      - name: Run linter
        run: just lint
      - name: Build binary
        run: just build
