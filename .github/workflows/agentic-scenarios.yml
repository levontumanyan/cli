name: Agentic Scenarios

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agentic-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Verify Copilot CLI
        run: copilot --version
      - name: Verify Docker daemon
        run: docker info
      - name: Run agentic scenario tests
        env:
          ELASTIC_AGENTIC_TESTS: "1"
          ELASTIC_AGENTIC_COPILOT_CLI: copilot
          ELASTIC_AGENTIC_ARTIFACTS_DIR: ${{ runner.temp }}/agentic-artifacts
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: go test ./tests/agentic -v
      - name: Upload agentic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-scenario-artifacts
          path: ${{ runner.temp }}/agentic-artifacts
