name: Agentic Scenarios (proposal)

on:
  workflow_dispatch:
    inputs:
      copilot_cli_path:
        description: Path to the Copilot CLI executable (default "copilot")
        required: false
        type: string
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  agentic-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify Docker daemon
        run: docker info
      - name: Run agentic scenario tests (opt-in)
        env:
          ELASTIC_AGENTIC_TESTS: "1"
          ELASTIC_AGENTIC_COPILOT_CLI: ${{ github.event.inputs.copilot_cli_path || '' }}
          ELASTIC_AGENTIC_ARTIFACTS_DIR: ${{ runner.temp }}/agentic-artifacts
        run: go test ./tests/agentic -v
      - name: Upload agentic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-scenario-artifacts
          path: ${{ runner.temp }}/agentic-artifacts
