name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Fetch ephemeral Github token
        id: fetch-token
        uses: elastic/ci-gh-actions/fetch-github-token@8a7604dfdd4e7fe21f969bfe9ff96e17635ea577 # v1.0.0
        with:
          vault-instance: "ci-prod"
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: "@elastic/cli"
          token: ${{ steps.fetch-token.outputs.token }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs['hashline-edit-release-created'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          persist-credentials: false
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm install
      - name: Run tests
        run: npm test
      - name: Publish
        run: npm publish
