name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: "@elastic/cli"
          token: ${{ secrets.RELEASE_PLEASE }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs['hashline-edit-release-created'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          persist-credentials: false
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm install
      - name: Run tests
        run: npm test
      - name: Publish
        run: npm publish
