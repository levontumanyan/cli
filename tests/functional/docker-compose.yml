services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.2.1}
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.2.1}
    depends_on:
      - elasticsearch
    command: >
      bash -c '
        for i in $(seq 1 60); do curl -s -u elastic:${ELASTIC_PASSWORD} http://elasticsearch:9200 >/dev/null && break; sleep 5; [ "$i" -eq 60 ] && exit 1; done;
        for i in $(seq 1 60); do curl -s -u elastic:${ELASTIC_PASSWORD} -H "Content-Type: application/json" -X POST http://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}" && break; sleep 5; [ "$i" -eq 60 ] && exit 1; done;
      '

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-9.2.1}
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_SECURITY_ENABLED=true
    ports:
      - "5601:5601"
