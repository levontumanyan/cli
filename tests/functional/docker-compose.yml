services:
  elasticsearch:
    image: &es_image docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-9.4.0-SNAPSHOT}
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  setup:
    image: *es_image
    depends_on:
      - elasticsearch
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./setup.sh:/setup.sh
    command: ["/bin/bash", "/setup.sh"]

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-9.4.0-SNAPSHOT}
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - XPACK_SECURITY_ENABLED=true
      - KBN_CONFIG_PATHS=/usr/share/kibana/config/kibana.yml,/usr/share/kibana/config/feature_flag_overrides.yml
    volumes:
      - ./feature_flag_overrides.yml:/usr/share/kibana/config/feature_flag_overrides.yml
    ports:
      - "5601:5601"
