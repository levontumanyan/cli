# Functional test pipeline for the Elastic CLI.
#
# Runs ES functional tests (Docker Elasticsearch + codegen'd bash scripts)
# and Cloud smoke tests (against the QA Cloud API).
#
# Vault paths must be registered before Cloud tests work:
#   secret/ci/elastic-cli/cloud-access
#
# Need to register this pipeline by contacting Platform team.

env:
  CLOUD_CREDENTIALS_PATH: "secret/ci/elastic-cli/cloud-access"
  NODE_VERSION: "22"

steps:
  - group: "ES Functional Tests"
    steps:
      - label: ":elasticsearch: ES functional tests — Node {{matrix.node}}"
        key: "es-functional"
        matrix:
          setup:
            node:
              - "22"
              - "24"
        agents:
          provider: gcp
          image: family/core-ubuntu-2204
        env:
          NODE_VERSION: "{{matrix.node}}"
          STACK_VERSION: "9.3.0"
        command: ".buildkite/run-es-tests.sh"

  - group: "Cloud Smoke Tests"
    steps:
      - label: ":cloud: Cloud smoke tests — Node {{matrix.node}}"
        key: "cloud-smoke"
        matrix:
          setup:
            node:
              - "22"
              - "24"
        agents:
          provider: gcp
          image: family/core-ubuntu-2204
        env:
          NODE_VERSION: "{{matrix.node}}"
        command: ".buildkite/run-cloud-tests.sh"
        artifact_paths:
          - "test/functional/cloud/*.log"
        soft_fail: true
